# Automatyczne wdrożenie aplikacji React / Vite na GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]

  # Umożliwia ręczne uruchomienie przepływu z zakładki Actions
  workflow_dispatch:

# Nadanie uprawnień do zapisu na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalacja zależności
        run: npm install

      - name: Budowanie projektu (Vite)
        run: npm run build

      - name: Przesłanie skompilowanej zawartości dist/
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Wdrożenie na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
